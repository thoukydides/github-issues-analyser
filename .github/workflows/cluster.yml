name: Structure FAQ
permissions:
  contents: write
concurrency:
  # Ensure only a single instance of this workflow runs at a time
  group: ${{ github.workflow }}

on:
  schedule:
  - cron: '13 21 * * *'
  workflow_dispatch:

jobs:
  cluster:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout analyser repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate FAQ structure
        run: npm exec tsx -- bin/structure-faq.ts

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          add:              ./data
          message:          'Updated FAQ structure'
          default_author:   github_actions
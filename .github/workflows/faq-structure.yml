name: Structure FAQ
permissions:
  contents: write
concurrency:
  # Ensure only a single instance of this workflow runs at a time
  group: ${{ github.workflow }}

on:
  schedule:
  - cron: '13/30 16-23,0-1 * * *'
  workflow_dispatch:

jobs:
  cluster:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout analyser repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate FAQ structure
        env:
          GEMINI_API_KEY: ${{ secrets.gemini_api_key_struct }}
        run: npm exec tsx -- bin/faq-structure.ts

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          add:              ./data
          message:          'Updated FAQ structure'
          default_author:   github_actions